<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — kevred</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #111113;
    --bg-elev-2: #16161a;
    --border: #1f1f23;
    --border-hi: #2a2a30;
    --text: #ededed;
    --text-dim: #a1a1aa;
    --text-muted: #6b6b75;
    --accent: #006fff;
    --accent-dim: #006fff20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  body {
    display: grid;
    place-items: center;
    padding: 32px 16px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(600px 300px at 50% 0%, rgba(0, 111, 255, 0.07), transparent 70%);
    pointer-events: none;
  }

  .top-link {
    position: absolute; top: 24px; left: 24px;
    font-size: 14px; color: var(--text-dim);
    display: inline-flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  .top-link:hover { color: var(--text); }

  .card {
    position: relative;
    width: 100%; max-width: 420px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 16px; letter-spacing: -0.01em;
    margin-bottom: 28px; justify-content: center;
  }
  .logo-mark { width: 72px; height: 72px; display: block; }

  h1 {
    font-size: 24px; line-height: 1.2; letter-spacing: -0.01em;
    font-weight: 600; margin-bottom: 8px; text-align: center;
  }

  .sub {
    color: var(--text-dim); font-size: 14px;
    text-align: center; margin-bottom: 28px;
  }

  form { display: flex; flex-direction: column; gap: 12px; }

  label {
    font-size: 13px; color: var(--text-dim);
    font-weight: 500;
  }

  input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border-hi);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="email"]::placeholder { color: var(--text-muted); }
  input[type="email"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .btn-primary {
    width: 100%;
    padding: 12px 16px;
    background: #006fff;
    color: #ffffff;
    border: 1px solid #006fff;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    margin-top: 8px;
  }
  .btn-primary:hover {
    background: #0056cc;
    color: #fff;
    border-color: #0056cc;
    box-shadow: 0 8px 24px rgba(0, 111, 255, 0.3);
  }

  .divider {
    margin: 24px 0 20px;
    text-align: center;
    font-size: 12px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    position: relative;
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%;
    width: calc(50% - 30px); height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .info {
    font-size: 13px; color: var(--text-muted);
    text-align: center; line-height: 1.5;
  }
  .info .mono {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
  }

  .legal {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }
  .legal a { color: var(--text-dim); border-bottom: 1px dotted var(--border-hi); }
  .legal a:hover { color: var(--text); }
</style>
</head>
<body>

<a href="index.html" class="top-link">← Back to home</a>

<div class="card">
  <div class="logo">
    <img src="logo_kevred_pixel.svg" class="logo-mark" alt="" />
    kevred
  </div>

  <h1>Sign in to kevred</h1>
  <p class="sub">We will send you a link to connect.</p>

  <form onsubmit="event.preventDefault(); const b=this.querySelector('button'); b.textContent='Check your inbox ✓'; setTimeout(()=>window.location.href='dashboard-empty.html', 900);">
    <label for="email">Email address</label>
    <input
      id="email"
      type="email"
      placeholder="you@company.com"
      autocomplete="email"
      required
      autofocus
    />
    <button type="submit" class="btn-primary">Send link</button>
  </form>

  <p class="info" style="margin-top: 24px;">
    New here? The same link creates your account on first sign-in.
  </p>

  <p class="legal">
    By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
  </p>
</div>

</body>
</html>
