name: app · build & publish image

on:
  push:
    tags:
      - 'app-v*.*.*-prod'
      - 'app-v*.*.*-develop'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kevredlabs/kevred-app
          tags: |
            type=raw,value=${{ contains(github.ref_name, '-prod') && 'latest' || 'develop' }}
            type=raw,value=${{ github.ref_name }}

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ contains(github.ref_name, '-prod') && 'https://api.kevred.com' || 'https://api.develop.kevred.com' }}
            VITE_RPC_DOMAIN=${{ contains(github.ref_name, '-prod') && 'rpc-mainnet.kevred.net' || 'rpc-mainnet.dev.kevred.net' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
