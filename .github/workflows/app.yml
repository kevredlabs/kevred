name: app · build & publish image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        env: [prod, develop]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kevredlabs/kevred-app
          tags: |
            type=raw,value=${{ matrix.env == 'prod' && 'latest' || 'develop' }}
            type=raw,value=${{ steps.vars.outputs.version }}-${{ matrix.env }}

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ matrix.env == 'prod' && 'https://api.kevred.com' || 'https://api.develop.kevred.com' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
